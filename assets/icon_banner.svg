<svg width="1440" height="1440" xmlns="http://www.w3.org/2000/svg">
  <!-- 柔和粉紫渐变背景 匹配小象图标治愈系 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5edf2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8ccd7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />
  
  <!-- 装饰气泡 -->
  <circle cx="150" cy="150" r="45" fill="#b388eb" opacity="0.2"/>
  <circle cx="1290" cy="200" r="65" fill="#b388eb" opacity="0.2"/>
  <circle cx="200" cy="1240" r="55" fill="#b388eb" opacity="0.2"/>
  <circle cx="1250" cy="1220" r="50" fill="#b388eb" opacity="0.2"/>
  
  <!-- 装饰星星 -->
  <path d="M 100 80 L 110 110 L 140 110 L 115 130 L 125 160 L 100 140 L 75 160 L 85 130 L 60 110 L 90 110 Z" fill="#8e44ad" opacity="0.2"/>
  <path d="M 1300 1100 L 1310 1120 L 1335 1120 L 1315 1135 L 1322 1158 L 1300 1143 L 1278 1158 L 1285 1135 L 1265 1120 L 1290 1120 Z" fill="#8e44ad" opacity="0.2"/>
  
  <!-- 主标题 -->
  <text x="720" y="320" font-size="160" font-weight="bold" text-anchor="middle" fill="#6a4c93">聪明格</text>
  
  <!-- 描述 -->
  <text x="720" y="420" font-size="40" text-anchor="middle" fill="#8a6c8a" opacity="0.9">经典逻辑推理游戏</text>
  <text x="720" y="480" font-size="28" text-anchor="middle" fill="#9a7c9a" opacity="0.85">锻炼思维 · 挑战智力 · 治愈放空</text>
  
  <!-- 圆形区域放小象，浅色背景衬托 -->
  <circle cx="720" cy="800" r="320" fill="white" opacity="0.4"/>
  
  <!-- 难度标签 -->
  <g opacity="0.95" transform="translate(290, 1120)">
    <rect x="0" y="0" width="100" height="42" rx="21" fill="white"/>
    <text x="50" y="28" font-size="20" text-anchor="middle" fill="#b388eb">入门 🟢</text>
    
    <rect x="110" y="0" width="100" height="42" rx="21" fill="white"/>
    <text x="160" y="28" font-size="20" text-anchor="middle" fill="#b388eb">中等 🟡</text>
    
    <rect x="220" y="0" width="100" height="42" rx="21" fill="white"/>
    <text x="270" y="28" font-size="20" text-anchor="middle" fill="#b388eb">困难 🟠</text>
    
    <rect x="330" y="0" width="100" height="42" rx="21" fill="white"/>
    <text x="380" y="28" font-size="20" text-anchor="middle" fill="#b388eb">专家 🔴</text>
  </g>
  
  <!-- 漂浮小花朵 -->
  <g transform="translate(150, 700)">
    <circle cx="0" cy="0" r="18" fill="#f8c8dc" opacity="0.8"/>
    <circle cx="-22" cy="-22" r="12" fill="#f8c8dc" opacity="0.8"/>
    <circle cx="22" cy="-22" r="12" fill="#f8c8dc" opacity="0.8"/>
    <circle cx="-22" cy="22" r="12" fill="#f8c8dc" opacity="0.8"/>
    <circle cx="22" cy="22" r="12" fill="#f8c8dc" opacity="0.8"/>
    <circle cx="0" cy="0" r="8" fill="#fff" opacity="1"/>
  </g>
  
  <g transform="translate(1250, 750)">
    <circle cx="0" cy="0" r="15" fill="#e1bee7" opacity="0.8"/>
    <circle cx="-18" cy="-18" r="10" fill="#e1bee7" opacity="0.8"/>
    <circle cx="18" cy="-18" r="10" fill="#e1bee7" opacity="0.8"/>
    <circle cx="-18" cy="18" r="10" fill="#e1bee7" opacity="0.8"/>
    <circle cx="18" cy="18" r="10" fill="#e1bee7" opacity="0.8"/>
    <circle cx="0" cy="0" r="6" fill="#fff" opacity="1"/>
  </g>
  
  <!-- 装饰数字 -->
  <text x="120" y="250" font-size="90" fill="#8e44ad" opacity="0.15">3</text>
  <text x="1320" y="250" font-size="90" fill="#8e44ad" opacity="0.15">5</text>
  <text x="120" y="1150" font-size="90" fill="#8e44ad" opacity="0.15">7</text>
  <text x="1320" y="1150" font-size="90" fill="#8e44ad" opacity="0.15">9</text>
</svg>

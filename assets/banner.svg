<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <!-- 浅粉渐变背景 参考用户图 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8ccd7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />
  
  <!-- 左上角：3 + 紫星 -->
  <g transform="translate(80, 80)">
    <path d="M 40 0 L 52 30 L 85 35 L 60 55 L 70 90 L 40 70 L 10 90 L 20 55 L 0 35 L 32 30 Z" fill="#884499" opacity="0.9"/>
    <circle cx="50" cy="50" r="40" fill="#9966bb" opacity="0.7"/>
    <text x="50" y="80" font-size="60" fill="#773399" font-weight="bold">3</text>
  </g>
  
  <!-- 右上角：5 -->
  <g transform="translate(1770, 80)">
    <circle cx="-50" cy="50" r="45" fill="#9966bb" opacity="0.7"/>
    <text x="-50" y="80" font-size="60" fill="#773399" font-weight="bold">5</text>
  </g>
  
  <!-- 左下角：7 -->
  <g transform="translate(80, 950)">
    <circle cx="50" cy="-50" r="45" fill="#9966bb" opacity="0.7"/>
    <text x="45" y="-10" font-size="60" fill="#773399" font-weight="bold">7</text>
  </g>
  
  <!-- 右下角：9 + 紫星 -->
  <g transform="translate(1800, 970)">
    <path d="M -80 -120 L -68 -90 L -35 -85 L -60 -65 L -50 -30 L -80 -50 L -110 -30 L -100 -65 L -120 -85 L -88 -90 Z" fill="#884499" opacity="0.9"/>
    <circle cx="-70" cy="-50" r="45" fill="#9966bb" opacity="0.7"/>
    <text x="-40" y="-5" font-size="60" fill="#773399" font-weight="bold">9</text>
  </g>
  
  <!-- 小花装饰 -->
  <g transform="translate(150, 400)">
    <circle cx="0" cy="0" r="12" fill="#f8c8dc" opacity="0.8"/>
    <circle cx="-20" cy="-20" r="8" fill="#f8c8dc" opacity="0.8"/>
    <circle cx="20" cy="-20" r="8" fill="#f8c8dc" opacity="0.8"/>
    <circle cx="-20" cy="20" r="8" fill="#f8c8dc" opacity="0.8"/>
    <circle cx="20" cy="20" r="8" fill="#f8c8dc" opacity="0.8"/>
    <circle cx="0" cy="0" r="4" fill="#fff" opacity="1"/>
  </g>
  
  <g transform="translate(1700, 500)">
    <circle cx="0" cy="0" r="10" fill="#e1bee7" opacity="0.8"/>
    <circle cx="-15" cy="-15" r="6" fill="#e1bee7" opacity="0.8"/>
    <circle cx="15" cy="-15" r="6" fill="#e1bee7" opacity="0.8"/>
    <circle cx="-15" cy="15" r="6" fill="#e1bee7" opacity="0.8"/>
    <circle cx="15" cy="15" r="6" fill="#e1bee7" opacity="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#fff" opacity="1"/>
  </g>
  
  <!-- 主标题 "聪明格" 黑色圆体 -->
  <text x="960" y="180" font-size="160" font-weight="bold" font-family="Arial Rounded MT Bold, sans-serif" text-anchor="middle" fill="#000000">聪明格</text>
  
  <!-- 中间白色大圆 放小象 -->
  <circle cx="960" cy="600" r="320" fill="white" opacity="1"/>
</svg>

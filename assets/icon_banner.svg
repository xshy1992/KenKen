<svg width="1440" height="1440" xmlns="http://www.w3.org/2000/svg">
  <!-- 柔和蓝紫渐变背景 治愈系 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />
  
  <!-- 装饰气泡 -->
  <circle cx="150" cy="150" r="45" fill="white" opacity="0.4"/>
  <circle cx="1290" cy="200" r="65" fill="white" opacity="0.4"/>
  <circle cx="200" cy="1240" r="55" fill="white" opacity="0.4"/>
  <circle cx="1250" cy="1220" r="50" fill="white" opacity="0.4"/>
  
  <!-- 装饰星星 -->
  <path d="M 100 80 L 110 110 L 140 110 L 115 130 L 125 160 L 100 140 L 75 160 L 85 130 L 60 110 L 90 110 Z" fill="#8888dd" opacity="0.3"/>
  <path d="M 1300 1100 L 1310 1120 L 1335 1120 L 1315 1135 L 1322 1158 L 1300 1143 L 1278 1158 L 1285 1135 L 1265 1120 L 1290 1120 Z" fill="#8888dd" opacity="0.3"/>
  
  <!-- 主标题 -->
  <text x="720" y="300" font-size="140" font-weight="bold" text-anchor="middle" fill="#5a5a8a">聪明格</text>
  
  <!-- 副标题 -->
  <text x="720" y="400" font-size="48" text-anchor="middle" fill="#6a6a9a" opacity="0.9">KenKen</text>
  
  <!-- 描述 -->
  <text x="720" y="480" font-size="28" text-anchor="middle" fill="#7a7aaa" opacity="0.85">经典逻辑推理游戏</text>
  <text x="720" y="530" font-size="24" text-anchor="middle" fill="#7a7aaa" opacity="0.8">锻炼思维 · 治愈放空</text>
  
  <!-- 圆形衬托区域放小象风格 -->
  <circle cx="720" cy="820" r="280" fill="white" opacity="0.5"/>
  
  <!-- 难度标签 -->
  <g opacity="0.95" transform="translate(310, 1080)">
    <rect x="0" y="0" width="100" height="42" rx="21" fill="white"/>
    <text x="50" y="28" font-size="20" text-anchor="middle" fill="#8EC5FC">入门 🟢</text>
    
    <rect x="110" y="0" width="100" height="42" rx="21" fill="white"/>
    <text x="160" y="28" font-size="20" text-anchor="middle" fill="#8EC5FC">中等 🟡</text>
    
    <rect x="220" y="0" width="100" height="42" rx="21" fill="white"/>
    <text x="270" y="28" font-size="20" text-anchor="middle" fill="#8EC5FC">困难 🟠</text>
    
    <rect x="330" y="0" width="100" height="42" rx="21" fill="white"/>
    <text x="380" y="28" font-size="20" text-anchor="middle" fill="#8EC5FC">专家 🔴</text>
  </g>
  
  <!-- 漂浮小花朵 -->
  <g transform="translate(150, 700)">
    <circle cx="0" cy="0" r="18" fill="#ffd6e0" opacity="0.8"/>
    <circle cx="-22" cy="-22" r="12" fill="#ffd6e0" opacity="0.8"/>
    <circle cx="22" cy="-22" r="12" fill="#ffd6e0" opacity="0.8"/>
    <circle cx="-22" cy="22" r="12" fill="#ffd6e0" opacity="0.8"/>
    <circle cx="22" cy="22" r="12" fill="#ffd6e0" opacity="0.8"/>
    <circle cx="0" cy="0" r="8" fill="#fff" opacity="1"/>
  </g>
  
  <g transform="translate(1250, 750)">
    <circle cx="0" cy="0" r="15" fill="#d4f1f4" opacity="0.8"/>
    <circle cx="-18" cy="-18" r="10" fill="#d4f1f4" opacity="0.8"/>
    <circle cx="18" cy="-18" r="10" fill="#d4f1f4" opacity="0.8"/>
    <circle cx="-18" cy="18" r="10" fill="#d4f1f4" opacity="0.8"/>
    <circle cx="18" cy="18" r="10" fill="#d4f1f4" opacity="0.8"/>
    <circle cx="0" cy="0" r="6" fill="#fff" opacity="1"/>
  </g>
  
  <!-- 装饰数字 -->
  <text x="120" y="250" font-size="90" fill="#8888dd" opacity="0.2">3</text>
  <text x="1320" y="250" font-size="90" fill="#8888dd" opacity="0.2">5</text>
  <text x="120" y="1150" font-size="90" fill="#8888dd" opacity="0.2">7</text>
  <text x="1320" y="1150" font-size="90" fill="#8888dd" opacity="0.2">9</text>
</svg>

<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8EC5FC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0C3FC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />
  
  <!-- 装饰气泡 -->
  <circle cx="200" cy="150" r="40" fill="white" opacity="0.2"/>
  <circle cx="1720" cy="200" r="60" fill="white" opacity="0.2"/>
  <circle cx="250" cy="900" r="50" fill="white" opacity="0.2"/>
  <circle cx="1650" cy="920" r="45" fill="white" opacity="0.2"/>
  
  <!-- 装饰星星 -->
  <path d="M 150 80 L 160 110 L 190 110 L 165 130 L 175 160 L 150 140 L 125 160 L 135 130 L 110 110 L 140 110 Z" fill="white" opacity="0.4"/>
  <path d="M 1750 800 L 1760 820 L 1785 820 L 1765 835 L 1772 858 L 1750 843 L 1728 858 L 1735 835 L 1715 820 L 1740 820 Z" fill="white" opacity="0.4"/>
  
  <!-- 标题 -->
  <text x="960" y="480" font-size="200" font-weight="bold" text-anchor="middle" fill="url(#titleGradient)">KenKen</text>
  
  <!-- 副标题 -->
  <text x="960" y="600" font-size="64" text-anchor="middle" fill="#4a4a8a" opacity="0.9">聪明格 · 经典逻辑推理游戏</text>
  
  <!-- 描述 -->
  <text x="960" y="680" font-size="36" text-anchor="middle" fill="#5a5a9a" opacity="0.85">锻炼思维 · 挑战智力 · 治愈放空</text>
  
  <!-- 难度标签 -->
  <g opacity="0.9">
    <rect x="580" y="730" width="100" height="48" rx="24" fill="white"/>
    <text x="630" y="763" font-size="24" text-anchor="middle" fill="#8EC5FC">入门 🟢</text>
    
    <rect x="700" y="730" width="100" height="48" rx="24" fill="white"/>
    <text x="750" y="763" font-size="24" text-anchor="middle" fill="#8EC5FC">中等 🟡</text>
    
    <rect x="820" y="730" width="100" height="48" rx="24" fill="white"/>
    <text x="870" y="763" font-size="24" text-anchor="middle" fill="#8EC5FC">困难 🟠</text>
    
    <rect x="940" y="730" width="100" height="48" rx="24" fill="white"/>
    <text x="990" y="763" font-size="24" text-anchor="middle" fill="#8EC5FC">专家 🔴</text>
  </g>
  
  <!-- 治愈系小熊图标 (简约动漫风) -->
  <g transform="translate(1450, 180) scale(0.8)">
    <!-- 身体 -->
    <ellipse cx="100" cy="180" rx="80" ry="70" fill="#8B5A2B" opacity="0.95"/>
    <!-- 头 -->
    <circle cx="100" cy="80" r="70" fill="#A67C52" opacity="0.95"/>
    <!-- 耳朵 -->
    <circle cx="50" cy="40" r="25" fill="#A67C52"/>
    <circle cx="150" cy="40" r="25" fill="#A67C52"/>
    <!-- 内耳 -->
    <circle cx="50" cy="40" r="12" fill="#D2B48C"/>
    <circle cx="150" cy="40" r="12" fill="#D2B48C"/>
    <!-- 眼睛 闭眼思考状 -->
    <path d="M 70 80 Q 80 90 90 80" stroke="#333" stroke-width="4" fill="none" rx="10"/>
    <path d="M 110 80 Q 120 90 130 80" stroke="#333" stroke-width="4" fill="none"/>
    <!-- 鼻子 -->
    <ellipse cx="100" cy="100" rx="12" ry="8" fill="#333"/>
    <!-- 嘴巴微笑 -->
    <path d="M 90 115 Q 100 125 110 115" stroke="#333" stroke-width="3" fill="none"/>
    <!-- 爪子数字装饰 -->
    <rect x="60" y="190" width="25" height="25" rx="5" fill="white" opacity="0.9"/>
    <text x="72" y="208" font-size="16" text-anchor="middle" fill="#8EC5FC" font-weight="bold">3</text>
    <rect x="110" y="190" width="25" height="25" rx="5" fill="white" opacity="0.9"/>
    <text x="122" y="208" font-size="16" text-anchor="middle" fill="#8EC5FC" font-weight="bold">5</text>
  </g>
  
  <!-- 装饰数字 -->
  <text x="120" y="200" font-size="90" fill="white" opacity="0.3">3</text>
  <text x="1780" y="200" font-size="90" fill="white" opacity="0.3">5</text>
  <text x="120" y="950" font-size="90" fill="white" opacity="0.3">7</text>
  <text x="1780" y="950" font-size="90" fill="white" opacity="0.3">9</text>
  
  <!-- 漂浮小花朵 -->
  <g transform="translate(200, 600)">
    <circle cx="0" cy="0" r="15" fill="#ffd6e0" opacity="0.7"/>
    <circle cx="-18" cy="-18" r="10" fill="#ffd6e0" opacity="0.7"/>
    <circle cx="18" cy="-18" r="10" fill="#ffd6e0" opacity="0.7"/>
    <circle cx="-18" cy="18" r="10" fill="#ffd6e0" opacity="0.7"/>
    <circle cx="18" cy="18" r="10" fill="#ffd6e0" opacity="0.7"/>
    <circle cx="0" cy="0" r="6" fill="#fff" opacity="0.9"/>
  </g>
  
  <g transform="translate(1700, 500)">
    <circle cx="0" cy="0" r="12" fill="#d4f1f4" opacity="0.7"/>
    <circle cx="-15" cy="-15" r="8" fill="#d4f1f4" opacity="0.7"/>
    <circle cx="15" cy="-15" r="8" fill="#d4f1f4" opacity="0.7"/>
    <circle cx="-15" cy="15" r="8" fill="#d4f1f4" opacity="0.7"/>
    <circle cx="15" cy="15" r="8" fill="#d4f1f4" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="#fff" opacity="0.9"/>
  </g>
</svg>

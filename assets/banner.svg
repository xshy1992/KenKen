<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />
  
  <!-- 装饰网格 -->
  <g opacity="0.1">
    <path d="M300 100 L300 530" stroke="white" stroke-width="2"/>
    <path d="M450 100 L450 530" stroke="white" stroke-width="2"/>
    <path d="M600 100 L600 530" stroke="white" stroke-width="2"/>
    <path d="M750 100 L750 530" stroke="white" stroke-width="2"/>
    <path d="M900 100 L900 530" stroke="white" stroke-width="2"/>
    <path d="M150 200 L1050 200" stroke="white" stroke-width="2"/>
    <path d="M150 315 L1050 315" stroke="white" stroke-width="2"/>
    <path d="M150 430 L1050 430" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- 标题 -->
  <text x="600" y="280" font-size="120" font-weight="bold" text-anchor="middle" fill="url(#titleGradient)">KenKen</text>
  
  <!-- 副标题 -->
  <text x="600" y="380" font-size="42" text-anchor="middle" fill="white" opacity="0.95">聪明格 · 经典逻辑推理游戏</text>
  
  <!-- 描述 -->
  <text x="600" y="450" font-size="24" text-anchor="middle" fill="white" opacity="0.8">锻炼思维 · 挑战智力 · 乐在其中</text>
  
  <!-- 难度标签 -->
  <g opacity="0.9">
    <rect x="320" y="490" width="70" height="30" rx="15" fill="white"/>
    <text x="355" y="512" font-size="16" text-anchor="middle" fill="#667eea">入门</text>
    
    <rect x="410" y="490" width="70" height="30" rx="15" fill="white"/>
    <text x="445" y="512" font-size="16" text-anchor="middle" fill="#667eea">中等</text>
    
    <rect x="500" y="490" width="70" height="30" rx="15" fill="white"/>
    <text x="535" y="512" font-size="16" text-anchor="middle" fill="#667eea">困难</text>
    
    <rect x="590" y="490" width="70" height="30" rx="15" fill="white"/>
    <text x="625" y="512" font-size="16" text-anchor="middle" fill="#667eea">专家</text>
  </g>
  
  <!-- 装饰数字 -->
  <text x="200" y="150" font-size="60" fill="white" opacity="0.3">3</text>
  <text x="1000" y="150" font-size="60" fill="white" opacity="0.3">5</text>
  <text x="200" y="500" font-size="60" fill="white" opacity="0.3">7</text>
  <text x="1000" y="500" font-size="60" fill="white" opacity="0.3">9</text>
</svg>

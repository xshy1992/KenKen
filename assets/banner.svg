<svg width="1280" height="720" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />
  
  <!-- 装饰网格 -->
  <g opacity="0.1">
    <path d="M320 120 L320 600" stroke="white" stroke-width="3"/>
    <path d="M480 120 L480 600" stroke="white" stroke-width="3"/>
    <path d="M640 120 L640 600" stroke="white" stroke-width="3"/>
    <path d="M800 120 L800 600" stroke="white" stroke-width="3"/>
    <path d="M960 120 L960 600" stroke="white" stroke-width="3"/>
    <path d="M160 240 L1120 240" stroke="white" stroke-width="3"/>
    <path d="M160 360 L1120 360" stroke="white" stroke-width="3"/>
    <path d="M160 480 L1120 480" stroke="white" stroke-width="3"/>
  </g>
  
  <!-- 标题 -->
  <text x="640" y="340" font-size="140" font-weight="bold" text-anchor="middle" fill="url(#titleGradient)">KenKen</text>
  
  <!-- 副标题 -->
  <text x="640" y="440" font-size="48" text-anchor="middle" fill="white" opacity="0.95">聪明格 · 经典逻辑推理游戏</text>
  
  <!-- 描述 -->
  <text x="640" y="510" font-size="28" text-anchor="middle" fill="white" opacity="0.8">锻炼思维 · 挑战智力 · 乐在其中</text>
  
  <!-- 难度标签 -->
  <g opacity="0.9">
    <rect x="360" y="560" width="80" height="36" rx="18" fill="white"/>
    <text x="400" y="586" font-size="18" text-anchor="middle" fill="#667eea">入门</text>
    
    <rect x="460" y="560" width="80" height="36" rx="18" fill="white"/>
    <text x="500" y="586" font-size="18" text-anchor="middle" fill="#667eea">中等</text>
    
    <rect x="560" y="560" width="80" height="36" rx="18" fill="white"/>
    <text x="600" y="586" font-size="18" text-anchor="middle" fill="#667eea">困难</text>
    
    <rect x="660" y="560" width="80" height="36" rx="18" fill="white"/>
    <text x="700" y="586" font-size="18" text-anchor="middle" fill="#667eea">专家</text>
  </g>
  
  <!-- 装饰数字 -->
  <text x="180" y="160" font-size="72" fill="white" opacity="0.3">3</text>
  <text x="1100" y="160" font-size="72" fill="white" opacity="0.3">5</text>
  <text x="180" y="600" font-size="72" fill="white" opacity="0.3">7</text>
  <text x="1100" y="600" font-size="72" fill="white" opacity="0.3">9</text>
</svg>

<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />
  
  <!-- 装饰气泡 -->
  <circle cx="150" cy="150" r="40" fill="white" opacity="0.3"/>
  <circle cx="1770" cy="200" r="60" fill="white" opacity="0.3"/>
  <circle cx="200" cy="900" r="50" fill="white" opacity="0.3"/>
  <circle cx="1700" cy="920" r="45" fill="white" opacity="0.3"/>
  
  <!-- 装饰星星 -->
  <path d="M 120 80 L 130 110 L 160 110 L 135 130 L 145 160 L 120 140 L 95 160 L 105 130 L 80 110 L 110 110 Z" fill="white" opacity="0.5"/>
  <path d="M 1750 800 L 1760 820 L 1785 820 L 1765 835 L 1772 858 L 1750 843 L 1728 858 L 1735 835 L 1715 820 L 1740 820 Z" fill="white" opacity="0.5"/>
  
  <!-- 标题 -->
  <text x="600" y="480" font-size="180" font-weight="bold" text-anchor="middle" fill="url(#titleGradient)">聪明格</text>
  
  <!-- 副标题 -->
  <text x="600" y="600" font-size="56" text-anchor="middle" fill="white" opacity="0.95">KenKen · 经典逻辑推理游戏</text>
  
  <!-- 描述 -->
  <text x="600" y="670" font-size="32" text-anchor="middle" fill="white" opacity="0.85">锻炼思维 · 挑战智力 · 治愈放空</text>
  
  <!-- 难度标签 -->
  <g opacity="0.95">
    <rect x="350" y="720" width="100" height="48" rx="24" fill="white"/>
    <text x="400" y="753" font-size="22" text-anchor="middle" fill="#667eea">入门 🟢</text>
    
    <rect x="470" y="720" width="100" height="48" rx="24" fill="white"/>
    <text x="520" y="753" font-size="22" text-anchor="middle" fill="#667eea">中等 🟡</text>
    
    <rect x="590" y="720" width="100" height="48" rx="24" fill="white"/>
    <text x="640" y="753" font-size="22" text-anchor="middle" fill="#667eea">困难 🟠</text>
    
    <rect x="710" y="720" width="100" height="48" rx="24" fill="white"/>
    <text x="760" y="753" font-size="22" text-anchor="middle" fill="#667eea">专家 🔴</text>
  </g>
  
  <!-- 治愈系小熊图标 (简约动漫风) 移动到右下区域更明显 -->
  <g transform="translate(1200, 550) scale(1.0)">
    <!-- 身体 -->
    <ellipse cx="120" cy="160" rx="90" ry="80" fill="#6b4423" opacity="1"/>
    <!-- 头 -->
    <circle cx="120" cy="60" r="75" fill="#8b6240" opacity="1"/>
    <!-- 耳朵 -->
    <circle cx="65" cy="15" r="28" fill="#8b6240"/>
    <circle cx="175" cy="15" r="28" fill="#8b6240"/>
    <!-- 内耳 -->
    <circle cx="65" cy="15" r="14" fill="#d2b48c"/>
    <circle cx="175" cy="15" r="14" fill="#d2b48c"/>
    <!-- 眼睛 闭眼思考状 -->
    <path d="M 90 50 Q 105 65 120 50" stroke="#222" stroke-width="5" fill="none" rx="10"/>
    <path d="M 120 50 Q 135 65 150 50" stroke="#222" stroke-width="5" fill="none"/>
    <!-- 鼻子 -->
    <ellipse cx="120" cy="78" rx="14" ry="10" fill="#333"/>
    <!-- 嘴巴微笑 -->
    <path d="M 105 95 Q 120 108 135 95" stroke="#333" stroke-width="4" fill="none"/>
    <!-- 爪子数字装饰 -->
    <rect x="70" y="170" width="30" height="30" rx="6" fill="white" opacity="0.95"/>
    <text x="85" y="191" font-size="20" text-anchor="middle" fill="#667eea" font-weight="bold">3</text>
    <rect x="115" y="170" width="30" height="30" rx="6" fill="white" opacity="0.95"/>
    <text x="130" y="191" font-size="20" text-anchor="middle" fill="#667eea" font-weight="bold">5</text>
  </g>
  
  <!-- 装饰数字 -->
  <text x="120" y="200" font-size="90" fill="white" opacity="0.3">3</text>
  <text x="1780" y="200" font-size="90" fill="white" opacity="0.3">5</text>
  <text x="120" y="950" font-size="90" fill="white" opacity="0.3">7</text>
  <text x="1780" y="950" font-size="90" fill="white" opacity="0.3">9</text>
  
  <!-- 漂浮小花朵 -->
  <g transform="translate(150, 500)">
    <circle cx="0" cy="0" r="18" fill="#ffd6e0" opacity="0.9"/>
    <circle cx="-22" cy="-22" r="12" fill="#ffd6e0" opacity="0.9"/>
    <circle cx="22" cy="-22" r="12" fill="#ffd6e0" opacity="0.9"/>
    <circle cx="-22" cy="22" r="12" fill="#ffd6e0" opacity="0.9"/>
    <circle cx="22" cy="22" r="12" fill="#ffd6e0" opacity="0.9"/>
    <circle cx="0" cy="0" r="8" fill="#fff" opacity="1"/>
  </g>
  
  <g transform="translate(1700, 400)">
    <circle cx="0" cy="0" r="15" fill="#d4f1f4" opacity="0.9"/>
    <circle cx="-18" cy="-18" r="10" fill="#d4f1f4" opacity="0.9"/>
    <circle cx="18" cy="-18" r="10" fill="#d4f1f4" opacity="0.9"/>
    <circle cx="-18" cy="18" r="10" fill="#d4f1f4" opacity="0.9"/>
    <circle cx="18" cy="18" r="10" fill="#d4f1f4" opacity="0.9"/>
    <circle cx="0" cy="0" r="6" fill="#fff" opacity="1"/>
  </g>
</svg>

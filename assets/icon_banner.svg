<svg width="1440" height="1440" xmlns="http://www.w3.org/2000/svg">
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />
  
  <!-- 装饰气泡 -->
  <circle cx="150" cy="150" r="45" fill="white" opacity="0.3"/>
  <circle cx="1290" cy="200" r="65" fill="white" opacity="0.3"/>
  <circle cx="200" cy="1240" r="55" fill="white" opacity="0.3"/>
  <circle cx="1250" cy="1220" r="50" fill="white" opacity="0.3"/>
  
  <!-- 装饰星星 -->
  <path d="M 100 80 L 110 110 L 140 110 L 115 130 L 125 160 L 100 140 L 75 160 L 85 130 L 60 110 L 90 110 Z" fill="white" opacity="0.5"/>
  <path d="M 1300 1100 L 1310 1120 L 1335 1120 L 1315 1135 L 1322 1158 L 1300 1143 L 1278 1158 L 1285 1135 L 1265 1120 L 1290 1120 Z" fill="white" opacity="0.5"/>
  
  <!-- 标题 -->
  <text x="720" y="400" font-size="180" font-weight="bold" text-anchor="middle" fill="url(#titleGradient)">KenKen</text>
  
  <!-- 副标题 -->
  <text x="720" y="520" font-size="52" text-anchor="middle" fill="white" opacity="0.95">聪明格</text>
  
  <!-- 描述 -->
  <text x="720" y="600" font-size="30" text-anchor="middle" fill="white" opacity="0.85">经典逻辑推理游戏</text>
  <text x="720" y="650" font-size="26" text-anchor="middle" fill="white" opacity="0.8">锻炼思维 · 挑战智力</text>
  
  <!-- 治愈系小熊图标 -->
  <g transform="translate(500, 750) scale(1.2)">
    <!-- 身体 -->
    <ellipse cx="120" cy="160" rx="90" ry="80" fill="#6b4423" opacity="1"/>
    <!-- 头 -->
    <circle cx="120" cy="60" r="75" fill="#8b6240" opacity="1"/>
    <!-- 耳朵 -->
    <circle cx="65" cy="15" r="28" fill="#8b6240"/>
    <circle cx="175" cy="15" r="28" fill="#8b6240"/>
    <!-- 内耳 -->
    <circle cx="65" cy="15" r="14" fill="#d2b48c"/>
    <circle cx="175" cy="15" r="14" fill="#d2b48c"/>
    <!-- 眼睛 闭眼思考状 -->
    <path d="M 90 50 Q 105 65 120 50" stroke="#222" stroke-width="5" fill="none" rx="10"/>
    <path d="M 120 50 Q 135 65 150 50" stroke="#222" stroke-width="5" fill="none"/>
    <!-- 鼻子 -->
    <ellipse cx="120" cy="78" rx="14" ry="10" fill="#333"/>
    <!-- 嘴巴微笑 -->
    <path d="M 105 95 Q 120 108 135 95" stroke="#333" stroke-width="4" fill="none"/>
    <!-- 爪子数字装饰 -->
    <rect x="70" y="170" width="30" height="30" rx="6" fill="white" opacity="0.95"/>
    <text x="85" y="191" font-size="20" text-anchor="middle" fill="#667eea" font-weight="bold">3</text>
    <rect x="115" y="170" width="30" height="30" rx="6" fill="white" opacity="0.95"/>
    <text x="130" y="191" font-size="20" text-anchor="middle" fill="#667eea" font-weight="bold">5</text>
  </g>
  
  <!-- 难度标签 -->
  <g opacity="0.95" transform="translate(0, 950)">
    <rect x="360" y="0" width="120" height="48" rx="24" fill="white"/>
    <text x="420" y="33" font-size="22" text-anchor="middle" fill="#667eea">入门 🟢</text>
    
    <rect x="500" y="0" width="120" height="48" rx="24" fill="white"/>
    <text x="560" y="33" font-size="22" text-anchor="middle" fill="#667eea">中等 🟡</text>
    
    <rect x="640" y="0" width="120" height="48" rx="24" fill="white"/>
    <text x="700" y="33" font-size="22" text-anchor="middle" fill="#667eea">困难 🟠</text>
    
    <rect x="780" y="0" width="120" height="48" rx="24" fill="white"/>
    <text x="840" y="33" font-size="22" text-anchor="middle" fill="#667eea">专家 🔴</text>
  </g>
  
  <!-- 漂浮小花朵 -->
  <g transform="translate(150, 700)">
    <circle cx="0" cy="0" r="18" fill="#ffd6e0" opacity="0.9"/>
    <circle cx="-22" cy="-22" r="12" fill="#ffd6e0" opacity="0.9"/>
    <circle cx="22" cy="-22" r="12" fill="#ffd6e0" opacity="0.9"/>
    <circle cx="-22" cy="22" r="12" fill="#ffd6e0" opacity="0.9"/>
    <circle cx="22" cy="22" r="12" fill="#ffd6e0" opacity="0.9"/>
    <circle cx="0" cy="0" r="8" fill="#fff" opacity="1"/>
  </g>
  
  <g transform="translate(1250, 750)">
    <circle cx="0" cy="0" r="15" fill="#d4f1f4" opacity="0.9"/>
    <circle cx="-18" cy="-18" r="10" fill="#d4f1f4" opacity="0.9"/>
    <circle cx="18" cy="-18" r="10" fill="#d4f1f4" opacity="0.9"/>
    <circle cx="-18" cy="18" r="10" fill="#d4f1f4" opacity="0.9"/>
    <circle cx="18" cy="18" r="10" fill="#d4f1f4" opacity="0.9"/>
    <circle cx="0" cy="0" r="6" fill="#fff" opacity="1"/>
  </g>
  
  <!-- 装饰数字 -->
  <text x="120" y="250" font-size="90" fill="white" opacity="0.3">3</text>
  <text x="1320" y="250" font-size="90" fill="white" opacity="0.3">5</text>
  <text x="120" y="1150" font-size="90" fill="white" opacity="0.3">7</text>
  <text x="1320" y="1150" font-size="90" fill="white" opacity="0.3">9</text>
</svg>
